<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Field picker</title>
    <style>
        :root {
            --foreground: oklch(0.145 0 0);
            --popover: oklch(1 0 0);
            --muted: oklch(0.97 0 0);
            --muted-foreground: oklch(0.556 0 0);
            --accent: oklch(0.97 0 0);
            --accent-foreground: oklch(0.205 0 0);
            --border: oklch(0.922 0 0);
            --ring: oklch(0.708 0 0);
            --radius: 0.625rem;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
        }

        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }

        body {
            background: oklch(0.97 0 0);
            color: var(--foreground);
            font-family: var(--font-sans);
            font-size: 0.875rem;
            line-height: 1.5;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 2rem;
        }

        /* ============================================================
           fu_picker — shadcn Command v4 (new-york-v4) visual.
           Maps the given markup to the Command primitive:
             > input            = CommandInput (search row, muted bg)
             > .fu_results      = CommandList wrapper
             > .fu_results::before = CommandEmpty (text from data-label-empty)
             > section          = CommandGroup
             > section > header = CommandGroup heading
             > button           = CommandItem
             > section + section = visual separator (handled via padding)
           Selection is a single [data-selected] state shared by
           keyboard + mouse — no separate :hover style.
           ============================================================ */
        .fu_picker {
            width: 20rem;
            max-width: calc(100vw - 2rem);
            background: var(--popover);
            color: var(--foreground);
            border: 1px solid var(--border);
            border-radius: calc(var(--radius) + 4px);
            box-shadow:
                0 10px 20px -5px color-mix(in oklch, oklch(0 0 0) 18%, transparent),
                0 4px 6px -4px color-mix(in oklch, oklch(0 0 0) 10%, transparent);
            padding: 0.375rem;
            display: flex;
            flex-direction: column;
            max-height: 24rem;
            overflow: hidden;

            & > input {
                display: block;
                width: 100%;
                background: var(--muted);
                border: none;
                border-radius: calc(var(--radius) - 2px);
                padding: 0 0.875rem;
                height: 2.75rem;
                flex: none;
                margin-bottom: 0.25rem;
                color: var(--foreground);
                font-family: inherit;
                font-size: 0.875rem;
                outline: none;

                &::placeholder { color: var(--muted-foreground); }
            }

            & > .fu_results {
                flex: 1;
                overflow-y: auto;
                overflow-x: hidden;
                overscroll-behavior: contain;
                padding: 0.125rem 0;

                /* CommandEmpty — text from data-label-empty, shown only
                   when the picker has the .-empty modifier. */
                &::before {
                    content: attr(data-label-empty);
                    display: none;
                    padding: 1.5rem 0.5rem;
                    text-align: center;
                    font-size: 0.8125rem;
                    color: var(--muted-foreground);
                }

                & > section {
                    color: var(--foreground);
                    padding: 0.25rem 0;

                    /* Separator between groups: top border on every
                       section after the first. */
                    & + section {
                        margin-top: 0.25rem;
                        padding-top: 0.5rem;
                        box-shadow: inset 0 1px 0 var(--border);
                    }

                    & > header {
                        padding: 0.375rem 0.625rem;
                        font-size: 0.75rem;
                        font-weight: 500;
                        color: var(--muted-foreground);
                        line-height: 1;
                    }

                    & > button {
                        display: flex;
                        align-items: center;
                        gap: 0.625rem;
                        padding: 0.5rem 0.625rem;
                        border: none;
                        border-radius: calc(var(--radius) - 4px);
                        font-size: 0.875rem;
                        color: var(--foreground);
                        cursor: pointer;
                        background: transparent;
                        width: 100%;
                        text-align: left;
                        font-family: inherit;
                        outline: none;
                        user-select: none;
                        transition: background-color .3s, color .3s;

                        /* `display: flex` above overrides UA's [hidden] {display:none},
                           so make it explicit. Same fix for the section below. */
                        &[hidden] { display: none; }

                        &[data-selected="true"] {
                            background: var(--accent);
                            color: var(--accent-foreground);
                        }
                    }
                }
            }

            /* Empty state — applied by JS when no buttons match the search. */
            &.-empty > .fu_results::before { display: block; }
        }
    </style>
</head>
<body>
    <div class="fu_picker">
        <input type="text" id="fu_3320" placeholder="Search…" autocomplete="off" spellcheck="false">
        <div class="fu_results" data-label-empty="No results found.">
            <section>
                <header>Fields</header>
                <button type="button" data-fu_type="text">Text</button>
                <button type="button" data-fu_type="textarea">Textarea</button>
                <button type="button" data-fu_type="number">Number</button>
                <button type="button" data-fu_type="checkbox">Checkbox</button>
                <button type="button" data-fu_type="color">Color</button>
                <button type="button" data-fu_type="hidden">Hidden</button>
                <button type="button" data-fu_type="checkboxes">Checkboxes</button>
                <button type="button" data-fu_type="radios">Radios</button>
                <button type="button" data-fu_type="select">Select</button>
            </section>
            <section>
                <header>Groups</header>
                <button type="button" data-fu_type="from_definition">Definition Instance</button>
                <button type="button" data-fu_type="group">Group</button>
                <button type="button" data-fu_type="tabs">Tabs</button>
                <button type="button" data-fu_type="radiotabs">Radio Tabs</button>
            </section>
            <section>
                <header>Repeaters</header>
                <button type="button" data-fu_type="repeater_table">Table</button>
                <button type="button" data-fu_type="repeater_array">Array</button>
                <button type="button" data-fu_type="repeater_single">Single</button>
                <button type="button" data-fu_type="repeater_multiple">Multiple</button>
            </section>
            <section>
                <header>Headers</header>
                <button type="button" data-fu_type="h1">Main Header</button>
                <button type="button" data-fu_type="h2">Medium Header</button>
                <button type="button" data-fu_type="h3">Small Header</button>
            </section>
            <section>
                <header>HTML</header>
                <button type="button" data-fu_type="p">Paragraph</button>
                <button type="button" data-fu_type="img">Image</button>
                <button type="button" data-fu_type="a">Link</button>
                <button type="button" data-fu_type="hr">Line</button>
                <button type="button" data-fu_type="br">Space</button>
                <button type="button" data-fu_type="function">JS Function</button>
            </section>
        </div>
    </div>

    <script>
        /* Command behaviour: shared selection state, mouse + keyboard,
           filter re-points to first visible item. Buttons use [hidden]
           (not display:none) so the :has() group rule can read them. */
        const picker = document.querySelector('.fu_picker');
        const input = picker.querySelector('input');
        const results = picker.querySelector('.fu_results');
        const items = [...results.querySelectorAll('button')];
        const sections = [...results.querySelectorAll('section')];

        const visibleItems = () => items.filter(i => !i.hidden);

        const selectItem = (item, { scroll = true } = {}) => {
            items.forEach(i => i.removeAttribute('data-selected'));
            if (!item) return;
            item.setAttribute('data-selected', 'true');
            if (scroll) item.scrollIntoView({ block: 'nearest' });
        };

        selectItem(items[0], { scroll: false });

        input.addEventListener('input', ({ target: { value } }) => {
            const q = value.trim().toLowerCase();
            let visibleCount = 0;

            items.forEach(item => {
                const match = !q || item.textContent.toLowerCase().includes(q);
                item.hidden = !match;
                if (match) visibleCount++;
            });

            // Hide whole sections whose buttons are all hidden
            sections.forEach(section => {
                const hasVisible = [...section.querySelectorAll('button')].some(b => !b.hidden);
                section.hidden = !hasVisible;
            });

            picker.classList.toggle('-empty', visibleCount === 0);
            selectItem(visibleItems()[0], { scroll: false });
        });

        input.addEventListener('keydown', (e) => {
            const v = visibleItems();
            if (!v.length) return;
            const current = results.querySelector('button[data-selected="true"]');
            const idx = v.indexOf(current);

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                selectItem(v[(idx + 1) % v.length]);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                selectItem(v[idx <= 0 ? v.length - 1 : idx - 1]);
            } else if (e.key === 'Home') {
                e.preventDefault();
                selectItem(v[0]);
            } else if (e.key === 'End') {
                e.preventDefault();
                selectItem(v[v.length - 1]);
            } else if (e.key === 'Enter') {
                e.preventDefault();
                current?.click();
            }
        });

        items.forEach(item => {
            item.addEventListener('mousemove', () => {
                if (item.getAttribute('data-selected') !== 'true') {
                    selectItem(item, { scroll: false });
                }
            });
        });

        input.focus();
    </script>
</body>
</html>
